<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Nephelometer Project Hub</title>
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f8fafc; --text: #334155; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; color: white; }
        .login-box { text-align: center; padding: 2.5rem; background: rgba(255,255,255,0.1); border-radius: 12px; backdrop-filter: blur(10px); }
        select, button { padding: 12px; border-radius: 6px; border: none; margin-top: 15px; font-size: 16px; width: 100%; cursor: pointer; }
        button { background: var(--accent); color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2563eb; }

        header { background: var(--primary); color: white; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .meet-controls a { background: white; color: var(--primary); padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-left: 10px; font-size: 14px; }

        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .column { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); min-height: 500px; }
        h2 { border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; color: var(--primary); }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 8px; }
        input, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; }
        ul { list-style: none; padding: 0; margin: 0; }
        
        .task-card { background: #fff; border: 1px solid #e2e8f0; border-left: 5px solid var(--accent); margin-bottom: 15px; padding: 15px; border-radius: 6px; }
        .task-title { font-weight: bold; font-size: 1.1em; color: var(--primary); margin-bottom: 5px; }
        .task-meta { font-size: 0.85em; color: #64748b; }
        
        .update-item { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .update-item:last-child { border-bottom: none; }
        .update-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .update-author { font-weight: bold; color: var(--accent); }
        .update-time { font-size: 0.8em; color: #94a3b8; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>Who is logging in?</h2>
        <select id="user-select">
            <option value="Anoop">Anoop</option>
            <option value="Rohan">Rohan</option>
            <option value="Manoj">Manoj</option>
            <option value="Member 4">Member 4</option>
        </select>
        <button onclick="window.login()">Enter Workspace</button>
    </div>
</div>

<header>
    <div>
        <h1 style="margin: 0; font-size: 1.5rem;">AI Nephelometer Project Hub</h1>
        <p style="margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.8;" id="welcome-text">Loading...</p>
    </div>
    <div class="meet-controls">
        <a href="https://meet.google.com/new" target="_blank">🎥 Join Team Meet</a>
        <a href="https://calendar.google.com/calendar/u/0/r/eventedit?text=Major+Project+Sync" target="_blank">📅 Schedule Sync</a>
    </div>
</header>

<div class="container">
    <div class="column">
        <h2>🎯 Current Weekly Goals</h2>
        <div class="input-group">
            <input type="text" id="goal-title" placeholder="E.g., Finalize System Design">
            <input type="text" id="goal-owner" placeholder="Who is leading this?">
            <button onclick="window.sendData('goals')">Set New Goal</button>
        </div>
        <ul id="goals-list"></ul>
    </div>

    <div class="column">
        <h2>⚡ Progress Updates</h2>
        <div class="input-group">
            <textarea id="update-text" rows="3" placeholder="What progress did you make today?"></textarea>
            <button onclick="window.sendData('updates')">Post Update to Team</button>
        </div>
        <ul id="updates-list"></ul>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAl49ZDjLdpWiuuyxHWTy2rEKc4CI2bNAQ",
        authDomain: "projecthub-51861.firebaseapp.com",
        databaseURL: "https://projecthub-51861-default-rtdb.firebaseio.com",
        projectId: "projecthub-51861",
        storageBucket: "projecthub-51861.firebasestorage.app",
        messagingSenderId: "535723375812",
        appId: "1:535723375812:web:6f9b41f5a11c44e1b4dd91",
        measurementId: "G-BZC2KJR64S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let user = "";

    // Attached to window so the HTML buttons can find the functions
    window.login = function() {
        user = document.getElementById('user-select').value;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('welcome-text').innerText = `Logged in as: ${user}`;
        listenToData(); 
    }

    window.sendData = function(type) {
        let dataObj = { user: user, time: new Date().toLocaleString() };
        
        if (type === 'goals') {
            const title = document.getElementById('goal-title').value;
            const owner = document.getElementById('goal-owner').value;
            if (!title) return;
            dataObj.title = title;
            dataObj.owner = owner;
            document.getElementById('goal-title').value = "";
            document.getElementById('goal-owner').value = "";
        } else {
            const text = document.getElementById('update-text').value;
            if (!text) return;
            dataObj.text = text;
            document.getElementById('update-text').value = "";
        }

        // Push data to Firebase Realtime Database
        push(ref(db, type), dataObj);
    }

    function listenToData() {
        // Listen for new Goals
        onValue(ref(db, 'goals'), (snapshot) => {
            const list = document.getElementById('goals-list');
            list.innerHTML = ""; 
            snapshot.forEach((child) => {
                const g = child.val();
                // Add new items to the top
                list.innerHTML = `
                    <li class="task-card">
                        <div class="task-title">${g.title}</div>
                        <div class="task-meta">Led by: <b>${g.owner}</b> | Set on: ${g.time.split(',')[0]}</div>
                    </li>
                ` + list.innerHTML;
            });
        });

        // Listen for new Updates
        onValue(ref(db, 'updates'), (snapshot) => {
            const list = document.getElementById('updates-list');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const u = child.val();
                list.innerHTML = `
                    <li class="update-item">
                        <div class="update-header">
                            <span class="update-author">${u.user}</span>
                            <span class="update-time">${u.time}</span>
                        </div>
                        <div>${u.text}</div>
                    </li>
                ` + list.innerHTML;
            });
        });
    }
</script>
</body>
</html>
