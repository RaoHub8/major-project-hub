<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nephelometer Hub</title>
    <style>
        /* Neon Dark Theme Variables */
        :root { 
            --bg: #0b0f19; 
            --panel: #111827; 
            --text: #e2e8f0; 
            --accent1: #00f3ff; 
            --accent2: #bd00ff; 
            --glow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Big Button Login Screen */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; padding: 20px;}
        .login-title { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: var(--glow); margin-bottom: 2rem; color: var(--accent1); text-align: center; }
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 500px; }
        .login-btn { 
            background: var(--panel); color: white; border: 2px solid #334155; padding: 20px; 
            font-size: 1.2rem; border-radius: 12px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; font-weight: bold; width: 100%;
        }
        .login-btn:hover { border-color: var(--accent1); box-shadow: var(--glow); transform: translateY(-3px); }

        /* Navigation & Header */
        header { background: var(--panel); border-bottom: 1px solid #334155; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .nav-tabs { display: flex; gap: 15px; flex-wrap: wrap; }
        .tab-btn { background: transparent; color: #94a3b8; border: none; font-size: 1.1rem; cursor: pointer; padding: 5px 10px; transition: 0.3s; }
        .tab-btn.active, .tab-btn:hover { color: var(--accent1); text-shadow: var(--glow); border-bottom: 2px solid var(--accent1); }
        
        /* Redesigned Meet Controls */
        .meet-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .meet-btn { background: linear-gradient(45deg, var(--accent1), var(--accent2)); color: #000; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; box-shadow: var(--glow); border: none; cursor: pointer; transition: 0.3s; }
        .meet-btn:hover { filter: brightness(1.2); }
        .logout-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* Main Container & Tabs */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.5s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Panels & Inputs */
        .panel { background: var(--panel); border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-sizing: border-box; }
        h2 { color: var(--accent1); margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input, textarea { background: #1e293b; border: 1px solid #475569; color: white; padding: 12px; border-radius: 6px; font-family: inherit; width: 100%; box-sizing: border-box; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent1); box-shadow: 0 0 5px rgba(0,243,255,0.3); }
        
        .action-btn { background: var(--panel); border: 1px solid var(--accent2); color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; }
        .action-btn:hover { background: var(--accent2); box-shadow: 0 0 10px rgba(189, 0, 255, 0.4); }

        /* Custom Grids for Layouts */
        .split-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }

        /* Workspace Lists */
        ul { list-style: none; padding: 0; margin: 0; }
        .task-card, .update-item { background: #1e293b; border-left: 4px solid var(--accent1); margin-bottom: 10px; padding: 15px; border-radius: 6px; word-wrap: break-word; }
        .update-header { display: flex; justify-content: space-between; margin-bottom: 5px; color: var(--accent1); font-weight: bold; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; padding: 1rem; }
            .nav-tabs { justify-content: center; width: 100%; margin-bottom: 15px; }
            .meet-controls { justify-content: space-between; width: 100%; }
            .split-grid { grid-template-columns: 1fr; } /* Stacks columns on top of each other */
            .grid-buttons { grid-template-columns: 1fr; } /* Stacks login buttons */
            .login-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 class="login-title">Project Hub</h1>
    <div class="grid-buttons">
        <button class="login-btn" onclick="window.login('Anoop')">Anoop</button>
        <button class="login-btn" onclick="window.login('Rohan')">Rohan</button>
        <button class="login-btn" onclick="window.login('Manoj')">Manoj</button>
        <button class="login-btn" onclick="window.login('Sneha')">Sneha</button>
    </div>
</div>

<header>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="window.switchTab('home')">🏠 Home</button>
        <button class="tab-btn" onclick="window.switchTab('research')">📚 Research</button>
        <button class="tab-btn" onclick="window.switchTab('workspace')">⚡ Workspace</button>
    </div>
    <div class="meet-controls">
        <span id="welcome-text" style="color: #94a3b8; font-weight: bold;"></span>
        <a href="https://meet.google.com/nis-txvd-oao" target="_blank" class="meet-btn">🎥 Team Meet</a>
        <button class="logout-btn" onclick="window.logout()">Logout</button>
    </div>
</header>

<div class="container">

    <div id="home" class="page active">
        <div class="panel">
            <h2>About Our Major Project</h2>
            <div id="project-description-area">
                <p><i>Click the "Edit Description" button below to paste your AI Nephelometer project details here...</i></p>
            </div>
            <br>
            <textarea id="temp-desc-input" rows="6" placeholder="Paste your project description here..."></textarea>
            <button class="action-btn" onclick="window.saveDescription()" style="margin-top: 10px;">Save Description</button>
        </div>
    </div>

    <div id="research" class="page">
        <div class="split-grid">
            <div class="panel">
                <h2>Add Research Paper</h2>
                <div class="input-group">
                    <input type="text" id="res-title" placeholder="Paper Title">
                    <textarea id="res-desc" rows="2" placeholder="Brief Description"></textarea>
                    <textarea id="res-takeaways" rows="2" placeholder="Key Takeaways"></textarea>
                    <textarea id="res-gaps" rows="2" placeholder="Identified Gaps"></textarea>
                    <input type="text" id="res-link" placeholder="Google Drive Link to PDF">
                    <button class="action-btn" onclick="window.sendData('research')">Upload Paper Data</button>
                </div>
            </div>
            <div class="panel">
                <h2>Research Database</h2>
                <div id="research-list"></div>
            </div>
        </div>
    </div>

    <div id="workspace" class="page">
        <div class="split-grid">
            <div class="panel">
                <h2>🎯 Weekly Goals</h2>
                <div class="input-group">
                    <input type="text" id="goal-title" placeholder="Task / Goal">
                    <input type="text" id="goal-owner" placeholder="Who is doing this?">
                    <button class="action-btn" onclick="window.sendData('goals')">Set Goal</button>
                </div>
                <ul id="goals-list"></ul>
            </div>

            <div class="panel">
                <h2>⚡ Progress Updates</h2>
                <div class="input-group">
                    <textarea id="update-text" rows="3" placeholder="What did you finish today?"></textarea>
                    <button class="action-btn" onclick="window.sendData('updates')">Post Update</button>
                </div>
                <ul id="updates-list"></ul>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAl49ZDjLdpWiuuyxHWTy2rEKc4CI2bNAQ",
        authDomain: "projecthub-51861.firebaseapp.com",
        databaseURL: "https://projecthub-51861-default-rtdb.firebaseio.com",
        projectId: "projecthub-51861",
        storageBucket: "projecthub-51861.firebasestorage.app",
        messagingSenderId: "535723375812",
        appId: "1:535723375812:web:6f9b41f5a11c44e1b4dd91",
        measurementId: "G-BZC2KJR64S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = "";

    window.switchTab = function(tabId) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    window.togglePaper = function(id) {
        const details = document.getElementById('details-' + id);
        details.style.display = details.style.display === 'block' ? 'none' : 'block';
    }

    window.onload = function() {
        const savedUser = localStorage.getItem('hubUser');
        if (savedUser) { window.login(savedUser); }
    };

    window.login = function(selectedUser) {
        user = selectedUser;
        localStorage.setItem('hubUser', user);
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('welcome-text').innerText = `[ ${user} ]`;
        listenToData(); 
    }

    window.logout = function() {
        localStorage.removeItem('hubUser');
        location.reload();
    }

    window.saveDescription = function() {
        const text = document.getElementById('temp-desc-input').value;
        document.getElementById('project-description-area').innerHTML = `<p>${text.replace(/\n/g, '<br>')}</p>`;
        document.getElementById('temp-desc-input').value = "";
    }

    window.sendData = function(type) {
        let dataObj = { user: user, time: new Date().toLocaleDateString() };
        
        if (type === 'goals') {
            const title = document.getElementById('goal-title').value;
            const owner = document.getElementById('goal-owner').value;
            if (!title) return;
            dataObj.title = title; dataObj.owner = owner;
            document.getElementById('goal-title').value = ""; document.getElementById('goal-owner').value = "";
        } else if (type === 'updates') {
            const text = document.getElementById('update-text').value;
            if (!text) return;
            dataObj.text = text;
            document.getElementById('update-text').value = "";
        } else if (type === 'research') {
            const title = document.getElementById('res-title').value;
            if (!title) return;
            dataObj.title = title;
            dataObj.desc = document.getElementById('res-desc').value;
            dataObj.takeaways = document.getElementById('res-takeaways').value;
            dataObj.gaps = document.getElementById('res-gaps').value;
            dataObj.link = document.getElementById('res-link').value;
            ['title', 'desc', 'takeaways', 'gaps', 'link'].forEach(id => document.getElementById(`res-${id}`).value = "");
        }

        push(ref(db, type), dataObj);
    }

    function listenToData() {
        onValue(ref(db, 'goals'), (snapshot) => {
            const list = document.getElementById('goals-list');
            list.innerHTML = ""; 
            snapshot.forEach((child) => {
                const g = child.val();
                list.innerHTML = `<li class="task-card"><b>${g.title}</b><br><small>Led by: ${g.owner}</small></li>` + list.innerHTML;
            });
        });

        onValue(ref(db, 'updates'), (snapshot) => {
            const list = document.getElementById('updates-list');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const u = child.val();
                list.innerHTML = `<li class="update-item"><div class="update-header"><span>${u.user}</span><span>${u.time}</span></div><div>${u.text}</div></li>` + list.innerHTML;
            });
        });

        onValue(ref(db, 'research'), (snapshot) => {
            const list = document.getElementById('research-list');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const p = child.val();
                const uniqueId = child.key; 
                list.innerHTML = `
                    <div class="task-card" style="padding:0;">
                        <div style="padding: 15px; cursor: pointer; display: flex; justify-content: space-between;" onclick="window.togglePaper('${uniqueId}')">
                            <span style="font-weight:bold; color:var(--text);">📄 ${p.title}</span> <span>➕</span>
                        </div>
                        <div id="details-${uniqueId}" style="display: none; padding: 15px; border-top: 1px solid #334155; background: #0f172a; font-size: 0.95rem; line-height: 1.5; color: #cbd5e1;">
                            <p><strong>Description:</strong> ${p.desc}</p>
                            <p><strong>Key Takeaways:</strong> ${p.takeaways}</p>
                            <p><strong>Gaps Identified:</strong> ${p.gaps}</p>
                            <p><strong>Added by:</strong> ${p.user}</p>
                            ${p.link ? `<a href="${p.link}" target="_blank" style="display: inline-block; margin-top: 10px; color: #000; background: var(--accent1); padding: 5px 12px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 0.85rem;">📂 Open PDF</a>` : ''}
                        </div>
                    </div>
                ` + list.innerHTML;
            });
        });
    }
</script>
</body>
</html>
